name: Android APK and AAB

on:
  workflow_dispatch:
  push:
    branches: [main-android]
    tags: ['v*']

permissions:
  contents: read

env:
  MIN_SDK_VERSION: 24
  TARGET_SDK_VERSION: 35
  RELEASE_BASENAME: vault-nest-release
  SIGNING_KEY_BASE64: ${{ secrets.KEYSTORE_BASE64 }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.16.0'
          cache: npm
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Install locked dependencies
        run: npm ci
      - name: Build Angular application
        run: npm run build -- --configuration=production
      - name: Generate and sync Android project
        run: |
          npx cap add android
          npx cap sync android
      - name: Apply SDK and release versions
        working-directory: android/app
        run: |
          VERSION_CODE=$(node -p "require('../../android-version.json').versionCode")
          VERSION_NAME=$(node -p "require('../../android-version.json').versionName")
          sed -i 's/versionCode [0-9]*/versionCode project.hasProperty("versionCode") ? project.versionCode.toInteger() : 1/' build.gradle
          sed -i 's/versionName "[^"]*"/versionName project.hasProperty("versionName") ? project.versionName : "0.1.0"/' build.gradle
          sed -i "s/minSdkVersion = .*/minSdkVersion = $MIN_SDK_VERSION/" ../variables.gradle
          sed -i "s/targetSdkVersion = .*/targetSdkVersion = $TARGET_SDK_VERSION/" ../variables.gradle
          echo "VERSION_CODE=$VERSION_CODE" >> "$GITHUB_ENV"
          echo "VERSION_NAME=$VERSION_NAME" >> "$GITHUB_ENV"
      - name: Generate launcher and store icons from brand image
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick
          declare -A SIZES=([mipmap-mdpi]=48 [mipmap-hdpi]=72 [mipmap-xhdpi]=96 [mipmap-xxhdpi]=144 [mipmap-xxxhdpi]=192)
          for DIR in "${!SIZES[@]}"; do
            SIZE=${SIZES[$DIR]}
            mkdir -p "android/app/src/main/res/$DIR"
            convert public/vault-nest.png -resize "${SIZE}x${SIZE}" "android/app/src/main/res/$DIR/ic_launcher.png"
            convert public/vault-nest.png -resize "${SIZE}x${SIZE}" "android/app/src/main/res/$DIR/ic_launcher_round.png"
            convert public/vault-nest.png -resize "${SIZE}x${SIZE}" "android/app/src/main/res/$DIR/ic_launcher_foreground.png"
          done
          mkdir -p releases
          convert public/vault-nest.png -resize 512x512 releases/playstore-icon.png
          declare -A SPLASH_SIZES=([drawable-port-mdpi]=480x800 [drawable-port-hdpi]=720x1200 [drawable-port-xhdpi]=960x1600 [drawable-port-xxhdpi]=1440x2400 [drawable-port-xxxhdpi]=1920x3200)
          for DIR in "${!SPLASH_SIZES[@]}"; do
            mkdir -p "android/app/src/main/res/$DIR"
            convert -size "${SPLASH_SIZES[$DIR]}" xc:'#111b21' public/vault-nest.png -resize 320x320 -gravity center -composite "android/app/src/main/res/$DIR/splash.png"
          done
      - name: Build release artifacts
        working-directory: android
        run: ./gradlew assembleRelease bundleRelease -PversionCode="$VERSION_CODE" -PversionName="$VERSION_NAME"
      - name: Decode signing key
        if: env.SIGNING_KEY_BASE64 != ''
        run: printf '%s' "$SIGNING_KEY_BASE64" | base64 --decode > android/app/release-keystore.jks
      - name: Sign APK and AAB
        if: env.SIGNING_KEY_BASE64 != ''
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          BUILD_TOOLS_DIR="${ANDROID_HOME}/build-tools/$(ls "${ANDROID_HOME}/build-tools/" | sort -V | tail -1)"
          APK=$(find android/app/build -name '*-release-unsigned.apk' | head -1)
          AAB=$(find android/app/build -name '*-release.aab' | head -1)
          "$BUILD_TOOLS_DIR/zipalign" -v 4 "$APK" "releases/${RELEASE_BASENAME}.apk"
          "$BUILD_TOOLS_DIR/apksigner" sign --ks android/app/release-keystore.jks --ks-pass env:KEYSTORE_PASSWORD --ks-key-alias "$KEY_ALIAS" --key-pass env:KEY_PASSWORD "releases/${RELEASE_BASENAME}.apk"
          jarsigner -keystore android/app/release-keystore.jks -storepass "$KEYSTORE_PASSWORD" -keypass "$KEY_PASSWORD" -signedjar "releases/${RELEASE_BASENAME}.aab" "$AAB" "$KEY_ALIAS"
      - name: Preserve unsigned artifacts when signing is unavailable
        if: env.SIGNING_KEY_BASE64 == ''
        run: |
          cp "$(find android/app/build -name '*-release-unsigned.apk' | head -1)" "releases/${RELEASE_BASENAME}-unsigned.apk"
          cp "$(find android/app/build -name '*-release.aab' | head -1)" "releases/${RELEASE_BASENAME}-unsigned.aab"
      - name: Remove decoded signing key
        if: always()
        run: rm -f android/app/release-keystore.jks
      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vault-nest-android-${{ env.VERSION_NAME }}
          path: |
            releases/*.apk
            releases/*.aab
            releases/playstore-icon.png
          if-no-files-found: error
          retention-days: 30
