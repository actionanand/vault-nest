name: Android APK and AAB

on:
  workflow_dispatch:
  push:
    branches: [main-android]
    tags: ['v*']

permissions:
  contents: write

concurrency:
  group: android-${{ github.ref }}
  cancel-in-progress: false

env:
  MIN_SDK_VERSION: 24
  TARGET_SDK_VERSION: 35
  RELEASE_BASENAME: vault-nest-release

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.16.0'
          cache: npm
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Install locked dependencies
        run: npm ci
      - name: Bump versionCode and commit
        if: github.ref == 'refs/heads/main-android'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          node scripts/bump-android-version.js
          VERSION_CODE=$(node -p "require('./android-version.json').versionCode")
          VERSION_NAME=$(node -p "require('./android-version.json').versionName")
          echo "🔢 Building versionName=$VERSION_NAME versionCode=$VERSION_CODE"
          git pull --rebase --autostash
          git add android-version.json
          git diff --cached --quiet || git commit -m "chore: bump versionCode to $VERSION_CODE [skip ci]"
          git push
      - name: Build Angular application
        run: npm run build -- --configuration=production
      - name: Generate and sync Android project
        run: |
          npx cap add android
          npx cap sync android
          node scripts/patch-android.mjs
      - name: Apply SDK and release versions
        working-directory: android/app
        run: |
          VERSION_CODE=$(node -p "require('../../android-version.json').versionCode")
          VERSION_NAME=$(node -p "require('../../android-version.json').versionName")
          sed -i 's/versionCode [0-9]*/versionCode project.hasProperty("versionCode") ? project.versionCode.toInteger() : 1/' build.gradle
          sed -i 's/versionName "[^"]*"/versionName project.hasProperty("versionName") ? project.versionName : "0.1.0"/' build.gradle
          sed -i "s/minSdkVersion = .*/minSdkVersion = $MIN_SDK_VERSION/" ../variables.gradle
          sed -i "s/targetSdkVersion = .*/targetSdkVersion = $TARGET_SDK_VERSION/" ../variables.gradle
          echo "VERSION_CODE=$VERSION_CODE" >> "$GITHUB_ENV"
          echo "VERSION_NAME=$VERSION_NAME" >> "$GITHUB_ENV"
          echo "✅ Applied android-version.json: versionName=$VERSION_NAME versionCode=$VERSION_CODE"
      - name: Generate launcher and store icons from brand image
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick
          declare -A SIZES=([mipmap-mdpi]=48 [mipmap-hdpi]=72 [mipmap-xhdpi]=96 [mipmap-xxhdpi]=144 [mipmap-xxxhdpi]=192)
          for DIR in "${!SIZES[@]}"; do
            SIZE=${SIZES[$DIR]}
            mkdir -p "android/app/src/main/res/$DIR"
            convert public/vault-nest.png -resize "${SIZE}x${SIZE}" "android/app/src/main/res/$DIR/ic_launcher.png"
            convert public/vault-nest.png -resize "${SIZE}x${SIZE}" "android/app/src/main/res/$DIR/ic_launcher_round.png"
            convert public/vault-nest.png -resize "${SIZE}x${SIZE}" "android/app/src/main/res/$DIR/ic_launcher_foreground.png"
          done
          mkdir -p releases
          convert public/vault-nest.png -resize 512x512 releases/playstore-icon.png
          declare -A SPLASH_SIZES=([drawable-port-mdpi]=480x800 [drawable-port-hdpi]=720x1200 [drawable-port-xhdpi]=960x1600 [drawable-port-xxhdpi]=1440x2400 [drawable-port-xxxhdpi]=1920x3200)
          for DIR in "${!SPLASH_SIZES[@]}"; do
            mkdir -p "android/app/src/main/res/$DIR"
            convert -size "${SPLASH_SIZES[$DIR]}" xc:'#111b21' public/vault-nest.png -resize 320x320 -gravity center -composite "android/app/src/main/res/$DIR/splash.png"
          done
      - name: Build unsigned release artifacts
        working-directory: android
        run: ./gradlew assembleRelease bundleRelease -PversionCode="$VERSION_CODE" -PversionName="$VERSION_NAME"

      - name: Decode release keystore
        id: keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [[ -n "$KEYSTORE_BASE64" && -n "$KEYSTORE_PASSWORD" && -n "$KEY_ALIAS" && -n "$KEY_PASSWORD" ]]; then
            if printf '%s' "$KEYSTORE_BASE64" | base64 --decode > android/app/release-keystore.jks; then
              echo "available=true" >> "$GITHUB_OUTPUT"
              echo "🔐 Release keystore decoded. Signed APK/AAB artifacts will be attempted."
            else
              rm -f android/app/release-keystore.jks
              echo "available=false" >> "$GITHUB_OUTPUT"
              echo "⚠️ KEYSTORE_BASE64 could not be decoded. Unsigned APK/AAB artifacts will be created."
            fi
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "⚠️ One or more signing secrets are missing. Unsigned APK/AAB artifacts will be created."
          fi

      - name: Detect keystore type
        id: keystore_type
        if: steps.keystore.outputs.available == 'true'
        continue-on-error: true
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        run: |
          KS_TYPE=$(keytool -list -keystore android/app/release-keystore.jks -storepass:env KEYSTORE_PASSWORD 2>/dev/null | grep -i "Keystore type" | awk '{print $NF}')
          echo "type=$KS_TYPE" >> "$GITHUB_OUTPUT"
          echo "🔎 Detected keystore type: $KS_TYPE"

      - name: Sign APK
        id: sign_apk
        if: steps.keystore.outputs.available == 'true'
        continue-on-error: true
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ steps.keystore_type.outputs.type == 'PKCS12' && secrets.KEYSTORE_PASSWORD || secrets.KEY_PASSWORD }}
        run: |
          mkdir -p releases
          UNSIGNED_APK=$(find android/app/build -name '*-release-unsigned.apk' | head -1)
          OUTPUT_APK="releases/${RELEASE_BASENAME}.apk"
          BUILD_TOOLS_DIR="${ANDROID_HOME}/build-tools/$(ls "${ANDROID_HOME}/build-tools/" | sort -V | tail -1)"
          "$BUILD_TOOLS_DIR/zipalign" -v 4 "$UNSIGNED_APK" "$OUTPUT_APK"
          "$BUILD_TOOLS_DIR/apksigner" sign --ks android/app/release-keystore.jks --ks-pass env:KEYSTORE_PASSWORD --ks-key-alias "$KEY_ALIAS" --key-pass env:KEY_PASSWORD "$OUTPUT_APK"
          "$BUILD_TOOLS_DIR/apksigner" verify --verbose "$OUTPUT_APK"
          echo "✅ SIGNED APK created: $OUTPUT_APK"

      - name: Copy unsigned APK
        if: steps.keystore.outputs.available != 'true' || steps.sign_apk.outcome == 'failure'
        run: |
          mkdir -p releases
          rm -f "releases/${RELEASE_BASENAME}.apk"
          UNSIGNED_APK=$(find android/app/build -name '*-release-unsigned.apk' | head -1)
          cp "$UNSIGNED_APK" "releases/${RELEASE_BASENAME}-unsigned.apk"
          echo "⚠️ UNSIGNED APK created: releases/${RELEASE_BASENAME}-unsigned.apk"

      - name: Sign AAB
        id: sign_aab
        if: steps.keystore.outputs.available == 'true'
        continue-on-error: true
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ steps.keystore_type.outputs.type == 'PKCS12' && secrets.KEYSTORE_PASSWORD || secrets.KEY_PASSWORD }}
        run: |
          mkdir -p releases
          UNSIGNED_AAB=$(find android/app/build -name '*-release.aab' | head -1)
          OUTPUT_AAB="releases/${RELEASE_BASENAME}.aab"
          STORE_PASS_FILE=$(mktemp)
          KEY_PASS_FILE=$(mktemp)
          trap 'rm -f "$STORE_PASS_FILE" "$KEY_PASS_FILE"' EXIT
          printf '%s' "$KEYSTORE_PASSWORD" > "$STORE_PASS_FILE"
          printf '%s' "$KEY_PASSWORD" > "$KEY_PASS_FILE"
          jarsigner -verbose -keystore android/app/release-keystore.jks -storepass:file "$STORE_PASS_FILE" -keypass:file "$KEY_PASS_FILE" -signedjar "$OUTPUT_AAB" "$UNSIGNED_AAB" "$KEY_ALIAS"
          jarsigner -verify -verbose -certs "$OUTPUT_AAB"
          echo "✅ SIGNED AAB created: $OUTPUT_AAB"

      - name: Copy unsigned AAB
        if: steps.keystore.outputs.available != 'true' || steps.sign_aab.outcome == 'failure'
        run: |
          mkdir -p releases
          rm -f "releases/${RELEASE_BASENAME}.aab"
          UNSIGNED_AAB=$(find android/app/build -name '*-release.aab' | head -1)
          cp "$UNSIGNED_AAB" "releases/${RELEASE_BASENAME}-unsigned.aab"
          echo "⚠️ UNSIGNED AAB created: releases/${RELEASE_BASENAME}-unsigned.aab"

      - name: Summarize Android artifacts
        if: always()
        run: |
          echo "📦 Android artifact summary"
          echo "==========================="
          if [[ -f "releases/${RELEASE_BASENAME}.apk" ]]; then
            APK_STATUS="✅ SIGNED APK created: releases/${RELEASE_BASENAME}.apk"
          elif [[ -f "releases/${RELEASE_BASENAME}-unsigned.apk" ]]; then
            APK_STATUS="⚠️ UNSIGNED APK created: releases/${RELEASE_BASENAME}-unsigned.apk"
          else
            APK_STATUS="❌ APK was not created because an earlier build step failed"
          fi
          if [[ -f "releases/${RELEASE_BASENAME}.aab" ]]; then
            AAB_STATUS="✅ SIGNED AAB created: releases/${RELEASE_BASENAME}.aab"
          elif [[ -f "releases/${RELEASE_BASENAME}-unsigned.aab" ]]; then
            AAB_STATUS="⚠️ UNSIGNED AAB created: releases/${RELEASE_BASENAME}-unsigned.aab"
          else
            AAB_STATUS="❌ AAB was not created because an earlier build step failed"
          fi
          echo "$APK_STATUS"
          echo "$AAB_STATUS"
          {
            echo "## 📦 Android artifact summary"
            echo "- $APK_STATUS"
            echo "- $AAB_STATUS"
          } >> "$GITHUB_STEP_SUMMARY"
          if [[ -d releases ]]; then
            ls -lh releases/
          else
            echo "ℹ️ The releases directory was not created."
          fi

      - name: Commit release files to main-android
        if: github.ref == 'refs/heads/main-android'
        run: |
          test -s "releases/${RELEASE_BASENAME}.apk" || test -s "releases/${RELEASE_BASENAME}-unsigned.apk"
          test -s "releases/${RELEASE_BASENAME}.aab" || test -s "releases/${RELEASE_BASENAME}-unsigned.aab"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase --autostash
          git add releases/
          if git diff --cached --quiet; then
            echo "ℹ️ Release files are unchanged; no release commit is needed."
          else
            git commit -m "build: update Android release files [skip ci]"
            git push
            echo "✅ APK, AAB, and Play Store icon committed to main-android/releases."
          fi

      - name: Remove decoded signing key
        if: always()
        run: rm -f android/app/release-keystore.jks
      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vault-nest-android-${{ env.VERSION_NAME }}
          path: |
            releases/*.apk
            releases/*.aab
            releases/playstore-icon.png
          if-no-files-found: error
          retention-days: 30
